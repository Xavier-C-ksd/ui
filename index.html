<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <div class="wifi">Wi-Fi</div>
      <div class="time">12:45 PM</div>
      <div class="battery">100%</div>
    </div>

    <!-- App Grid -->
    <div class="app-grid">
      <a href="#" class="app-icon" onclick="openApp('Phone', this)">
        <i class="fa fa-phone"></i>
        <span>Phone</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Camera', this)">
        <i class="fa fa-camera"></i>
        <span>Camera</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Music', this)">
        <i class="fa fa-music"></i>
        <span>Music</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Maps', this)">
        <i class="fa fa-map"></i>
        <span>Maps</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Messages', this)">
        <i class="fa fa-message"></i>
        <span>Messages</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Calendar', this)">
        <i class="fa fa-calendar"></i>
        <span>Calendar</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Clock', this)">
        <i class="fa fa-clock"></i>
        <span>Clock</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Weather', this)">
        <i class="fa fa-cloud"></i>
        <span>Weather</span>
      </a>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-icon" onclick="openPage('home')">
        <i class="fa fa-home"></i>
      </div>
      <div class="nav-icon" onclick="openPage('overview')">
        <i class="fa fa-th-large"></i>
      </div>
      <div class="nav-icon" onclick="goBack()">
        <i class="fa fa-arrow-left"></i>
      </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" onclick="addNewApp()">+</div>
  </div>

  <!-- App Pages -->
  <div id="home" class="page active"></div>
  <div id="settings" class="page"><h1>Settings Page</h1></div>
  <div id="camera" class="page"><h1>Camera Page</h1></div>

  <script src="script.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js"></script>

</body>
</html>
