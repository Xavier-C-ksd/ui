<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
      font-family: 'Roboto', sans-serif;
    }

    .phone {
      width: 375px;
      height: 667px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(6px);
      background-image: url('https://www.w3schools.com/w3images/forest.jpg');
      background-size: cover;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      background-color: rgba(0, 0, 0, 0.4);
      height: 20px;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      color: white;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      padding: 2px 10px;
    }

    .status-bar div {
      display: flex;
      align-items: center;
    }

    .status-bar .battery, .status-bar .wifi, .status-bar .time {
      font-size: 12px;
    }

    /* App Icons Grid - 4x6 */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 15px;
      padding: 20px;
      margin-top: 60px;
      overflow: hidden;
      flex: 1;
    }

    .app-icon {
      background-color: rgba(52, 152, 219, 0.6);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, background-color 0.3s ease;
      backdrop-filter: blur(10px);
      width: 80px;
      height: 80px;
      margin: auto;
    }

    .app-icon:hover {
      transform: scale(1.1);
      background-color: rgba(52, 152, 219, 0.8);
    }

    .app-icon i {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .app-icon span {
      font-size: 12px;
      text-align: center;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      border-radius: 25px 25px 0 0;
      backdrop-filter: blur(8px);
    }

    .nav-icon {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .nav-icon i {
      font-size: 30px;
      margin-bottom: 5px;
    }

    .fab {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background-color: #ff5733;
      border-radius: 50%;
      padding: 15px;
      color: white;
      font-size: 30px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .fab:hover {
      transform: scale(1.1);
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    /* Full-screen app animation */
    .app-fullscreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(52, 152, 219, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      border-radius: 0;
      backdrop-filter: blur(5px);
      transition: all 0.7s cubic-bezier(0.32, 0.68, 0.18, 1);
      z-index: 100;
    }

    /* Transform the icon into a "fullscreen" mode */
    .app-icon.active-icon {
      transform: scale(10) translate(50%, 50%);
      transition: transform 0.7s cubic-bezier(0.32, 0.68, 0.18, 1);
      z-index: 50;
    }
    
  </style>
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <div class="wifi">Wi-Fi</div>
      <div class="time">12:45 PM</div>
      <div class="battery">100%</div>
    </div>

    <!-- App Grid -->
    <div class="app-grid">
      <a href="#" class="app-icon" onclick="openApp('Phone', this)">
        <i class="fa fa-phone"></i>
        <span>Phone</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Camera', this)">
        <i class="fa fa-camera"></i>
        <span>Camera</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Music', this)">
        <i class="fa fa-music"></i>
        <span>Music</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Maps', this)">
        <i class="fa fa-map"></i>
        <span>Maps</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Messages', this)">
        <i class="fa fa-message"></i>
        <span>Messages</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Calendar', this)">
        <i class="fa fa-calendar"></i>
        <span>Calendar</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Clock', this)">
        <i class="fa fa-clock"></i>
        <span>Clock</span>
      </a>
      <a href="#" class="app-icon" onclick="openApp('Weather', this)">
        <i class="fa fa-cloud"></i>
        <span>Weather</span>
      </a>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-icon" onclick="openPage('home')">
        <i class="fa fa-home"></i>
      </div>
      <div class="nav-icon" onclick="openPage('overview')">
        <i class="fa fa-th-large"></i>
      </div>
      <div class="nav-icon" onclick="goBack()">
        <i class="fa fa-arrow-left"></i>
      </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" onclick="addNewApp()">+</div>
  </div>

  <!-- App Pages -->
  <div id="home" class="page active"></div>
  <div id="settings" class="page"><h1>Settings Page</h1></div>
  <div id="camera" class="page"><h1>Camera Page</h1></div>

  <script src="https://kit.fontawesome.com/a076d05399.js"></script>

  <script>
    function openApp(appName, element) {
      // Add active class to the app icon for animation
      element.classList.add('active-icon');

      // Create and show the full-screen app div
      const appFullscreen = document.createElement('div');
      appFullscreen.classList.add('app-fullscreen');
      appFullscreen.innerHTML = `<h2>${appName}</h2>`;
      document.body.appendChild(appFullscreen);

      // After the animation ends, show the app content
      setTimeout(() => {
        appFullscreen.innerHTML = `<h1>${appName} Loaded!</h1>`;
      }, 700);

      // After another 1 second, remove the full-screen app and reset the icon
      setTimeout(() => {
        appFullscreen.remove();
        element.classList.remove('active-icon');
      }, 1700);
    }

    function goBack() {
      openPage('home');
    }

    function addNewApp() {
      alert("New app functionality coming soon!");
    }

    function openPage(page) {
      // Handle page transitions
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page).classList.add('active');
    }
  </script>
</body>
</html>
